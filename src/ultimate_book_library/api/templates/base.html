<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Ultimate Book Library{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="site-nav container">
        <ul>
            <li>
                <a href="/" class="site-brand">
                    <span class="brand-icon">&#128218;</span>
                    <strong>Ultimate Book Library</strong>
                </a>
            </li>
        </ul>
        <ul>
            <li><a href="/">Browse</a></li>
            <li><a href="/api/stats">API</a></li>
            <li><a href="/docs">Docs</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container site-footer">
        <p>Ultimate Book Library &mdash; A curated collection of the best books in the world.</p>
        <p class="footer-links">
            <a href="/api/stats">API Stats</a> &middot;
            <a href="/docs">API Documentation</a>
        </p>
    </footer>
</body>
</html>
